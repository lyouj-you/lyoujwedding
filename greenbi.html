<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roots deeper, Love stronger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel+Decorative:wght@400;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --charcoal: #1a1a1a;
    --charcoal-deep: #111111;
    --charcoal-mid: #1e1e1e;
    --gold: #b8966a;
    --gold-light: #d4b896;
    --cream: #f0ebe2;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--charcoal-deep);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  /* ── SECTION STRUCTURE ── */
  .section {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── PAGE 1 ── */
  .page1 {
    background: var(--charcoal-deep);
  }

  .page1-inner {
    position: relative;
    width: 100%;
    max-width: 900px;
    padding: 60px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* The scanned page image — tinted to sit on charcoal */
  .page1-image {
    width: 100%;
    max-width: 780px;
    border-radius: 2px;
    mix-blend-mode: screen;
    opacity: 0.88;
    filter: sepia(20%) brightness(0.9) contrast(1.1);
    transition: opacity 0.6s ease;
  }

  /* Decorative line */
  .rule {
    width: 1px;
    height: 80px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin: 40px auto;
    opacity: 0;
    animation: fadeInRule 1.4s 0.8s ease forwards;
  }

  @keyframes fadeInRule {
    to { opacity: 0.7; }
  }

  /* Subtitle beneath image */
  .page1-meta {
    text-align: center;
    letter-spacing: 0.3em;
    font-size: 0.75rem;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s 1.2s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 0.7; transform: translateY(0); }
  }

  /* scroll hint arrow */
  .scroll-hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp 1s 2s ease forwards;
  }

  .scroll-hint span {
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.6;
  }

  .arrow {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scaleY(0.8); }
    50% { opacity: 0.8; transform: scaleY(1); }
  }

  /* ── TRANSITION BAND ── */
  .transition-band {
    height: 200px;
    background: linear-gradient(
      to bottom,
      var(--charcoal-deep) 0%,
      var(--charcoal-mid) 50%,
      #161618 100%
    );
    position: relative;
  }

  .transition-band::before {
    content: '✦';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1rem;
    color: var(--gold);
    opacity: 0.4;
    letter-spacing: 1.5em;
    padding-left: 1.5em; /* compensate for letter-spacing */
  }

  /* ── PAGE 2 ── */
  .page2 {
    background: #161618;
    flex-direction: column;
    gap: 60px;
    padding: 80px 40px;
  }

  .page2-image-wrap {
    width: 100%;
    max-width: 900px;
    position: relative;
  }

  .page2-image {
    width: 100%;
    border-radius: 2px;
    filter: brightness(0.55) contrast(1.05) grayscale(30%);
    display: block;
  }

  /* soft vignette over sculpture */
  .page2-image-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at center, transparent 30%, rgba(22,22,24,0.6) 100%),
      linear-gradient(to bottom, rgba(22,22,24,0.5) 0%, transparent 30%, transparent 70%, rgba(22,22,24,0.7) 100%);
    border-radius: 2px;
    pointer-events: none;
  }

  .page2-caption {
    text-align: center;
    max-width: 520px;
  }

  .page2-caption h2 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1rem, 3vw, 1.5rem);
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--gold-light);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .page2-caption p {
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(240,235,226,0.45);
    line-height: 2;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--gold);
    opacity: 0.4;
    margin: 20px auto;
  }

  /* ── SCROLL-DRIVEN FADE-IN ── */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1), transform 0.9s cubic-bezier(0.22,1,0.36,1);
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* page1 image entrance */
  .page1-image {
    opacity: 0;
    transform: scale(0.97);
    transition: opacity 1.2s ease, transform 1.4s ease;
  }

  .page1-image.visible {
    opacity: 0.88;
    transform: scale(1);
  }
</style>
</head>

<script>
  // Intersection Observer for scroll reveals
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        // stagger siblings
        const siblings = entry.target.parentElement
          ? [...entry.target.parentElement.querySelectorAll('.reveal')]
          : [entry.target];
        const idx = siblings.indexOf(entry.target);
        setTimeout(() => {
          entry.target.classList.add('visible');
        }, idx * 160);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
